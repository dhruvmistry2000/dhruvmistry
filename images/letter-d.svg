<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="50" cy="50" r="47" fill="#0d1117"/>

  <!-- Outer ring with gradient -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="47" fill="url(#glowGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="50" y1="6" x2="50" y2="94" stroke="#00ff88" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="6" y1="50" x2="94" y2="50" stroke="#00ff88" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Corner bracket marks -->
  <polyline points="20,14 14,14 14,20" fill="none" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4" stroke-linecap="round"/>
  <polyline points="80,14 86,14 86,20" fill="none" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4" stroke-linecap="round"/>
  <polyline points="20,86 14,86 14,80" fill="none" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4" stroke-linecap="round"/>
  <polyline points="80,86 86,86 86,80" fill="none" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- The D letterform — geometric & clean -->
  <g filter="url(#glow)">
    <!-- Stem (left vertical bar) -->
    <rect x="27" y="24" width="8" height="52" rx="1.5" fill="url(#dGrad)"/>

    <!-- Top horizontal -->
    <rect x="27" y="24" width="20" height="7" rx="1.5" fill="url(#dGrad)"/>

    <!-- Bottom horizontal -->
    <rect x="27" y="69" width="20" height="7" rx="1.5" fill="url(#dGrad)"/>

    <!-- Curved right side of D -->
    <path d="M47 24 Q76 24 76 50 Q76 76 47 76"
          fill="none"
          stroke="url(#dGrad)"
          stroke-width="7.5"
          stroke-linecap="round"/>
  </g>

  <!-- Accent dot — blinking cursor vibe -->
  <circle cx="72" cy="72" r="3" fill="#00d4ff" opacity="0.85"/>
  <circle cx="72" cy="72" r="5.5" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>

</svg>
